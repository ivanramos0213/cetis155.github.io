<!DOCTYPE html>

</head><body>
<nav class="navbar navbar-expand-lg fixed-top"><div class="container">

<a href="{{ url_for('admin_usuarios') }}" class="btn btn-sm btn-primary">Ver</a>

<div class="col-md-3"><div class="card text-center"><div class="card-body">
