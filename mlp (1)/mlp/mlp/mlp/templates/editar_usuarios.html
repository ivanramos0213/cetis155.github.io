<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Editar Usuario</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container mt-5">
    <h2>Editar Usuario</h2>
    <form action="{{ url_for('actualizar_usuario', id=usuario.id) }}" method="POST" class="bg-white p-4 rounded shadow-sm">
      <div class="mb-3">
        <label class="form-label">Usuario</label>
        <input type="text" name="usuario" value="{{ usuario.usuario }}" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Correo</label>
        <input type="email" name="correo" value="{{ usuario.correo }}" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Teléfono</label>
        <input type="text" name="telefono" value="{{ usuario.telefono }}" class="form-control">
      </div>
      <div class="mb-3">
        <label class="form-label">Contraseña</label>
        <input type="password" name="password" value="{{ usuario.password }}" class="form-control">
      </div>
      <button type="submit" class="btn btn-success">Guardar cambios</button>
      <a href="{{ url_for('admin_usuarios') }}" class="btn btn-secondary">Cancelar</a>
    </form>
  </div>
</body>
</html>
