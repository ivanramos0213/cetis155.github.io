<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Entregas</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>body{padding-top:70px;background:#f0f0f0;}</style>
</head><body>
<nav class="navbar navbar-expand-lg fixed-top bg-primary"><div class="container">
<a class="navbar-brand text-white" href="{{ url_for('profesor_dashboard') }}">Volver</a>
</div></nav>
<div class="container mt-4">
<h3>{{ tarea.titulo }}</h3>
<p class="text-muted">Clase: {{ tarea.clase_nombre }}</p>
<div class="card"><div class="card-body">
<h5>Entregas de Alumnos</h5>
{% for entrega in entregas %}
<div class="card mb-3"><div class="card-body">
<h6>{{ entrega.nombre_completo }} ({{ entrega.correo }})</h6>
<p><small>Entregado: {{ entrega.fecha_entrega.strftime('%d/%m/%Y %H:%M') if entrega.fecha_entrega }}</small></p>
<p>{{ entrega.contenido }}</p>
<form method="POST" action="{{ url_for('calificar_entrega', entrega_id=entrega.id) }}" class="row g-2">
<div class="col-md-3">
<input type="number" name="calificacion" class="form-control" placeholder="Calificación"
value="{{ entrega.calificacion or '' }}" min="0" max="{{ tarea.puntos }}" step="0.1" required>
</div>
<div class="col-md-7">
<input type="text" name="comentarios" class="form-control" placeholder="Comentarios"
value="{{ entrega.comentarios or '' }}">
</div>
<div class="col-md-2">
<button type="submit" class="btn btn-primary w-100">Calificar</button>
</div>
</form>
</div></div>
{% endfor %}
</div></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
