<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Dashboard Profesor</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.css') }}">
<style>:root{--azul:#3b5998;}body{font-family:sans-serif;padding-top:70px;background:#f0f0f0;}.navbar{background:#fff;box-shadow:0 2px 8px rgba(0,0,0,0.1);}.card{margin:20px 0;box-shadow:0 2px 8px rgba(0,0,0,0.1);}.btn-primary{background:var(--azul);border:none;}</style>
</head><body>
<nav class="navbar navbar-expand-lg fixed-top"><div class="container">
<a class="navbar-brand" href="{{ url_for('index') }}">CETIS 155</a>
<a href="{{ url_for('logout') }}" class="btn btn-sm btn-danger">Salir</a>
</div></nav>
<div class="container mt-4">
<div class="d-flex justify-content-between mb-4">
<h2>Mis Clases</h2>
<button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#crearClaseModal">+ Nueva Clase</button>
</div>
<div class="row">
{% for clase in clases %}
<div class="col-md-4"><div class="card"><div class="card-body">
<h5>{{ clase.nombre }}</h5>
<p class="text-muted">{{ clase.descripcion }}</p>
<p><strong>Código:</strong> {{ clase.codigo }}</p>
<p><small>Alumnos: {{ clase.num_alumnos }}</small></p>
<a href="{{ url_for('ver_clase_profesor', clase_id=clase.id) }}" class="btn btn-sm btn-primary">Gestionar</a>
</div></div></div>
{% endfor %}
</div></div>
<div class="modal fade" id="crearClaseModal"><div class="modal-dialog"><div class="modal-content">
<div class="modal-header"><h5>Crear Nueva Clase</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
<form method="POST" action="{{ url_for('crear_clase') }}"><div class="modal-body">
<div class="mb-3"><label>Nombre</label><input type="text" name="nombre" class="form-control" required></div>
<div class="mb-3"><label>Descripción</label><textarea name="descripcion" class="form-control" rows="3" required></textarea></div>
</div><div class="modal-footer">
<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
<button type="submit" class="btn btn-primary">Crear</button>
</div></form></div></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
