<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Clases</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>body{padding-top:70px;background:#f0f0f0;}</style>
</head><body>
<nav class="navbar navbar-expand-lg fixed-top bg-primary"><div class="container">
<a class="navbar-brand text-white" href="{{ url_for('admin_panel') }}">Admin</a>
</div></nav>
<div class="container mt-4"><h2>Gestión de Clases</h2>
<table class="table bg-white"><thead><tr>
<th>ID</th><th>Nombre</th><th>Código</th><th>Profesor</th><th>Alumnos</th>
</tr></thead><tbody>
{% for clase in clases %}
<tr><td>{{ clase.id }}</td><td>{{ clase.nombre }}</td><td><strong>{{ clase.codigo }}</strong></td>
<td>{{ clase.profesor_nombre }}</td><td>{{ clase.num_alumnos }}</td></tr>
{% endfor %}
</tbody></table></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
