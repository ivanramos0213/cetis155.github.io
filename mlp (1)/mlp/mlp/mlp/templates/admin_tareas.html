<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Tareas</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>body{padding-top:70px;background:#f0f0f0;}</style>
</head><body>
<nav class="navbar navbar-expand-lg fixed-top bg-primary"><div class="container">
<a class="navbar-brand text-white" href="{{ url_for('admin_panel') }}">Admin</a>
</div></nav>
<div class="container mt-4"><h2>Gestión de Tareas</h2>
<table class="table bg-white"><thead><tr>
<th>ID</th><th>Título</th><th>Clase</th><th>Profesor</th><th>Entregas</th><th>Puntos</th>
</tr></thead><tbody>
{% for tarea in tareas %}
<tr><td>{{ tarea.id }}</td><td>{{ tarea.titulo }}</td><td>{{ tarea.clase_nombre }}</td>
<td>{{ tarea.profesor_nombre }}</td><td>{{ tarea.num_entregas }}</td><td>{{ tarea.puntos }}</td></tr>
{% endfor %}
</tbody></table></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
