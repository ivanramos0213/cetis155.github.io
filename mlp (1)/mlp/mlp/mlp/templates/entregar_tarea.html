<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Entregar Tarea</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>body{padding-top:70px;background:#f0f0f0;}</style>
</head><body>
<nav class="navbar navbar-expand-lg fixed-top bg-primary"><div class="container">
<a class="navbar-brand text-white" href="{{ url_for('alumno_dashboard') }}">Volver</a>
</div></nav>
<div class="container mt-4">
<div class="card"><div class="card-body">
<h3>{{ tarea.titulo }}</h3>
<p class="text-muted">Clase: {{ tarea.clase_nombre }}</p>
<p>{{ tarea.descripcion }}</p>
<p><strong>Fecha entrega:</strong> {{ tarea.fecha_entrega.strftime('%d/%m/%Y %H:%M') if tarea.fecha_entrega }}</p>
<p><strong>Puntos:</strong> {{ tarea.puntos }}</p>
<hr>
<form method="POST">
<div class="mb-3"><label>Tu respuesta</label>
<textarea name="contenido" class="form-control" rows="10" required>{{ tarea.contenido_anterior or '' }}</textarea>
</div>
<button type="submit" class="btn btn-primary">Entregar Tarea</button>
</form>
</div></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
